# ------------------------------------------------------------------------------
# INPUT SETTINGS
# ------------------------------------------------------------------------------
input:
  # Folder where your PDF books live.
  # Relative paths are resolved from project root.
  books_dir: "./books"

  # Which files in books_dir should be processed.
  # Pinned to current scanned test book for deterministic dry runs.
  glob: "The Mysteries of Life and Death (scan).pdf"

# ------------------------------------------------------------------------------
# RUNTIME SETTINGS (cost, speed, robustness)
# ------------------------------------------------------------------------------
runtime:
  # Multimodal model used for page -> QnA generation.
  model: "gpt-4.1"

  # Lower = more deterministic, higher = more creative/diverse.
  # For dataset generation, 0.1-0.3 is usually safer.
  temperature: 0.2

  # Page cap per book to control spend.
  # Set high enough to cover full book runs.
  max_pages_per_book: 100

  # First-pass render DPI for PDF page image conversion.
  dpi: 220

  # If page is classified as blank/unreadable, retry once at this DPI.
  retry_dpi: 300

  # Number of retries for unusable pages.
  # 0 disables retry; 1 is a practical default.
  max_unusable_retries: 1

  # API timeout per request (seconds).
  request_timeout_seconds: 180

  # Delay between requests to reduce rate-limit pressure.
  sleep_seconds_between_requests: 0.4

  # If true, logs every request prompt (including retries) to JSONL.
  # Useful for debugging prompt quality and reproducibility.
  log_prompts: true

  # Where prompt logs are written when log_prompts is true.
  prompt_log_path: "./output/prompt_log.jsonl"

  # If true, logs API call telemetry (latency/tokens/cost estimate) to JSONL.
  log_api_metrics: true

  # Path for per-call API telemetry logs.
  api_metrics_log_path: "./output/api_metrics.jsonl"

  # Pricing used for generation call cost estimation (USD per 1M tokens).
  # Update these values to match your active provider pricing.
  generation_input_cost_per_1m_tokens_usd: 5.0
  generation_output_cost_per_1m_tokens_usd: 15.0

  # Pricing used for judge/critique call cost estimation (USD per 1M tokens).
  judge_input_cost_per_1m_tokens_usd: 5.0
  judge_output_cost_per_1m_tokens_usd: 15.0

  # If true, persist checkpoint state after each processed page.
  checkpoint_enabled: true

  # Checkpoint path used for crash-safe resume.
  checkpoint_path: "./output/run_checkpoint.json"

  # If true, logs are append-only (safer for recovery and audit history).
  append_mode: true

  # Fallback log for failed write attempts.
  failed_writes_log_path: "./output/failed_writes.jsonl"

  # Parallel workers for model-based QA critique stage.
  # 1 disables parallel critique, 3-6 is a practical speedup range.
  parallel_critique_workers: 4

  # Max wait for all parallel critique futures for one page.
  # If exceeded, unfinished critique tasks are cancelled and marked failed.
  parallel_future_timeout_seconds: 300

  # JSONL process log with stage-level events and per-call success messages.
  process_log_path: "./output/process_log.jsonl"

  # If true, also prints process events to console.
  verbose_success_logs: true

# ------------------------------------------------------------------------------
# DATASET SHAPE SETTINGS
# ------------------------------------------------------------------------------
dataset:
  # Main ChatML-style JSONL output path.
  output_path: "./output/chatml_dataset.jsonl"

  # Separate log for blank/unreadable pages that were skipped.
  skipped_pages_output_path: "./output/skipped_pages.jsonl"

  # Target number of QnA pairs per usable page.
  qas_per_page: 4

  # High-level learner persona; influences answer tone/style.
  user_profile: "curious self-learner who likes practical examples"

  # Controls diversity of generated examples.
  variety:
    # Question categories to mix within each page batch.
    question_types:
      - "factual"
      - "reasoning"
      - "compare-contrast"
      - "application"

    # Difficulty distribution target (should sum to ~1.0).
    difficulty_mix:
      easy: 0.3
      medium: 0.5
      hard: 0.2

    # Preferred answer formats.
    answer_style:
      - "concise"
      - "step-by-step"
      - "example-driven"

  # Citation behavior in generated QnA metadata.
  citation:
    # If true, model tries to include a short supporting quote.
    require_quote_span: true

    # Max characters in the citation quote.
    max_quote_chars: 300

# ------------------------------------------------------------------------------
# PROMPT SETTINGS
# ------------------------------------------------------------------------------
prompts:
  # System prompt used for every page request.
  # Keep instructions grounding-focused to reduce hallucination.
  system: |
    You create high-quality instruction tuning data from a single book page image.
    Only use information visible on the page image.
    If data is unclear or missing, avoid fabricating specifics.
    Return strictly valid JSON matching the schema.

# ------------------------------------------------------------------------------
# QUALITY GATE SETTINGS
# ------------------------------------------------------------------------------
quality:
  # Master switch for post-generation filtering.
  enabled: true

  # If true, runs a second model pass per QA item for self-critique.
  # This improves quality but increases cost and latency.
  use_model_self_critique: true

  # Model used for critique pass.
  # You can set this to a stronger model than runtime.model.
  critique_model: "gpt-4.1"

  # Reject if grounding score is below this threshold (0..1).
  min_grounding_score: 0.55

  # Reject if usefulness score is below this threshold (0..1).
  min_usefulness_score: 0.5

  # Near-duplicate threshold for QA pair similarity (0..1).
  duplicate_similarity_threshold: 0.9

  # If PDF text is extractable, require citation quote to appear in page text.
  require_citation_match_if_text_available: true

  # Per-item quality decision log output.
  quality_log_path: "./output/quality_log.jsonl"

# ------------------------------------------------------------------------------
# ANALYTICS SETTINGS
# ------------------------------------------------------------------------------
analytics:
  # End-of-run report with yield, distribution, duplicate rate, etc.
  report_path: "./output/analytics_report.json"
  # Dedicated token summary report.
  token_stats_path: "./output/token_stats.json"
